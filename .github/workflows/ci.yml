name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Sample PDF fixture
        run: python scripts/make_sample_pdf.py

      - name: Tests
        run: pytest -q

      - name: Build wheel
        run: python -m build

  standalone:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: peerfold-linux
          - os: macos-latest
            asset: peerfold-macos
          - os: windows-latest
            asset: peerfold-win.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build executable
        shell: bash
        run: |
          base="${{ matrix.asset }}"
          base="${base%.exe}"
          python scripts/build_executable.py --name "$base"

      - name: Verify executable
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/peerfold-win.exe --version
          else
            base="${{ matrix.asset }}"
            base="${base%.exe}"
            "dist/$base" --version
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}*

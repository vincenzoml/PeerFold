name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import sys; sys.path.insert(0, 'src'); from peerfold import __version__; print(__version__)")
          echo "tag=$TAG package=$VERSION"
          test "$TAG" = "$VERSION"

      - name: Verify launcher pin matches package version
        run: python scripts/check_versions.py

      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python scripts/check_versions.py
          twine upload dist/*

      - name: Verify PyPI has release
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          python scripts/check_release_parity.py --require-pypi "$TAG"

  github-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: peerfold-linux
          - os: macos-latest
            name: peerfold-macos
          - os: windows-latest
            name: peerfold-win

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import sys; sys.path.insert(0, 'src'); from peerfold import __version__; print(__version__)")
          echo "tag=$TAG package=$VERSION"
          test "$TAG" = "$VERSION"

      - name: Build executable
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" pyinstaller
          if [ "${{ runner.os }}" = "macOS" ]; then
            python scripts/build_icon.py
          fi
          python scripts/build_executable.py --name ${{ matrix.name }}

      - name: Verify executable
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/peerfold-win.exe --version
          elif [ "${{ runner.os }}" = "macOS" ]; then
            dist/peerfold-macos.command --version
          else
            "dist/${{ matrix.name }}" --version
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/peerfold-win.exe
            dist/peerfold-linux
            dist/peerfold-macos.command
            dist/peerfold-macos.dmg
          fail_on_unmatched_files: false
          generate_release_notes: ${{ matrix.os == 'ubuntu-latest' }}

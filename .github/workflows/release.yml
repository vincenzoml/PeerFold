name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine upload dist/*

  github-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: peerfold-linux
          - os: macos-latest
            name: peerfold-macos
          - os: windows-latest
            name: peerfold-win

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build executable
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" pyinstaller
          python scripts/build_executable.py --name ${{ matrix.name }}

      - name: Verify executable
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/peerfold-win.exe --version
          elif [ "${{ runner.os }}" = "macOS" ]; then
            "dist/${{ matrix.name }}/${{ matrix.name }}" --version
          else
            "dist/${{ matrix.name }}" --version
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.name }}*
          generate_release_notes: ${{ matrix.os == 'ubuntu-latest' }}

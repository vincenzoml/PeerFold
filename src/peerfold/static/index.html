<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>PeerFold</title>
  <link rel="icon" href="/static/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/static/icon-180.png">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-leading" aria-live="polite">
      <img class="brand-mark" src="/static/icon-32.png" width="20" height="20" alt="">
      <span class="app-brand">PeerFold</span>
      <span id="app-version-current" class="app-version-badge" title="App version"></span>
      <button id="app-version-available" type="button" class="app-version-available" hidden></button>
      <span id="doc-sep" class="topbar-sep" hidden aria-hidden="true">·</span>
      <span id="doc-title" class="doc-title" hidden></span>
      <span id="doc-meta" class="doc-meta muted"></span>
    </div>
    <div class="topbar-actions">
      <button id="update-btn" type="button" class="btn btn-update primary" hidden>Update</button>
      <div class="window-controls" aria-label="Windows">
        <button id="new-window-btn" type="button" class="btn btn-icon" title="New window (⌘⇧N)" aria-label="New window">+</button>
        <button id="duplicate-window-btn" type="button" class="btn btn-icon" title="Duplicate window (⌘⇧D)" aria-label="Duplicate window">⧉</button>
      </div>
      <button id="open-pdf-btn" type="button" class="btn" title="Open PDF (⌘O)">Open…</button>
      <label class="reviewer-field">
        <span>Reviewer</span>
        <input id="reviewer" type="text" maxlength="16" spellcheck="false" autocomplete="off"
               list="reviewer-list" placeholder="VC" aria-label="Reviewer short name">
        <datalist id="reviewer-list"></datalist>
      </label>
    </div>
  </header>

  <div class="toolbar" role="toolbar" aria-label="Annotation tools">
    <span class="toolbar-label">Highlight</span>
    <div id="palette" class="palette palette-wrap" role="radiogroup" aria-label="Highlight colour"></div>
    <div class="zoom-controls" aria-label="Zoom">
      <button id="zoom-out" type="button" class="btn zoom-btn" title="Zoom out (⌘−)">−</button>
      <span id="zoom-label" class="zoom-label">100%</span>
      <button id="zoom-in" type="button" class="btn zoom-btn" title="Zoom in (⌘+)">+</button>
      <button id="zoom-reset" type="button" class="btn zoom-btn" title="Actual size (⌘0)">⟲</button>
    </div>
    <div class="history-controls" aria-label="Undo and redo">
      <button id="undo-btn" type="button" class="btn zoom-btn" title="Undo (⌘Z)" disabled aria-label="Undo">↩</button>
      <button id="redo-btn" type="button" class="btn zoom-btn" title="Redo (⌘⇧Z)" disabled aria-label="Redo">↪</button>
    </div>
  </div>

  <input id="open-pdf-input" type="file" accept=".pdf,application/pdf" hidden>

  <div id="workspace" class="workspace">
    <main id="viewer" class="viewer" tabindex="0">
      <div id="pages-viewport" class="pages-viewport">
        <div id="pages" class="pages"></div>
      </div>
    </main>
    <div id="workspace-splitter" class="workspace-splitter" role="separator"
         aria-orientation="vertical" aria-controls="comments-pane" tabindex="0"
         title="Drag to resize comments"></div>
    <aside id="comments-pane" class="comments-pane" aria-label="Comments">
      <header class="comments-pane-head">
        <div class="comments-pane-title">
          <strong>Comments</strong>
          <span id="comments-count" class="muted">0</span>
          <button id="comments-collapse-btn" type="button" class="btn-pane-toggle"
                  title="Collapse comments" aria-expanded="true" aria-controls="comments-list">›</button>
        </div>
        <div id="comments-selection-bar" class="comments-selection-bar" hidden>
          <span id="comments-selection-count" class="comments-selection-count">0 selected</span>
          <button id="comments-copy-selected" type="button" class="btn btn-ghost-sm">Copy</button>
          <button id="comments-delete-selected" type="button" class="btn btn-danger-sm">Delete</button>
          <button id="comments-clear-selection" type="button" class="btn btn-ghost-sm">Clear</button>
        </div>
      </header>
      <div id="comments-list" class="comments-list"></div>
    </aside>
  </div>

  <div id="toast" class="toast" hidden></div>
  <menu id="ctx-menu" class="ctx-menu" hidden></menu>

  <div id="comment-editor" class="comment-editor" hidden>
    <div class="comment-editor-backdrop" aria-hidden="true"></div>
    <div class="comment-editor-panel" role="dialog" aria-modal="true" aria-labelledby="comment-editor-title">
      <div class="comment-editor-accent" aria-hidden="true"></div>
      <header class="comment-editor-head">
        <div id="comment-editor-title" class="comment-editor-title"></div>
        <div id="comment-editor-meta" class="comment-editor-meta"></div>
      </header>
      <blockquote id="comment-editor-quote" class="comment-editor-quote"></blockquote>
      <div class="comment-editor-body">
        <div class="comment-editor-input-wrap">
          <textarea id="comment-editor-ta" rows="7" spellcheck="true"></textarea>
          <button type="button" id="comment-editor-delete" class="comment-delete-btn" hidden
                  title="Delete comment" aria-label="Delete comment">
            <svg class="comment-delete-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M8 3h8l1 2h4v2H3V5h4l1-2zm1 6h2v9H9V9zm4 0h2v9h-2V9z"/>
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    d="M5 7h14M7 5l1-2h8l1 2"/>
            </svg>
          </button>
        </div>
      </div>
      <footer id="comment-editor-foot" class="comment-editor-foot"></footer>
    </div>
  </div>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
